<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        if (typeof window !== 'undefined') {
          try {
            var originalFetch = window.fetch;
            if (originalFetch) {
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function() { 
                  console.warn('Blocked attempt to overwrite window.fetch. This is usually caused by a polyfill or tracking script.'); 
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // If the property is non-configurable, we can't do much but log it
            console.log('Note: window.fetch is already protected by the environment.');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
